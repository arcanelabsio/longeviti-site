title: Longeviti
tagline: Nutrition coaching, grounded in your health reports
description: >
  Longeviti is a practitioner-led nutrition coaching platform developed at
  Arcane Labs. Certified nutritionists review your health reports and deliver
  personalized meal and supplement plans through a modern app.

url: "https://longeviti.app"
baseurl: ""

author:
  name: Arcane Labs
  email: hello@arcanelabs.info
  url: https://longeviti.app
  github: arcanelabsio

# Vendor / organization — surfaced by jekyll-seo-tag as JSON-LD Organization
# and read by templates for the footer and any "developed by" marketing copy.
organization:
  name: Arcane Labs
  url: https://github.com/arcanelabsio
  email: hello@arcanelabs.info

# Social — consumed by jekyll-seo-tag for Twitter/OG cards.
twitter:
  username: arcanelabsio
  card: summary_large_image

social:
  name: Arcane Labs
  links:
    - https://github.com/arcanelabsio
    - https://longeviti.app

repository: arcanelabsio/longeviti-site

# Jekyll built-in theme disabled — we ship our own CSS to mirror the app's design tokens.
theme: null

# GitHub Pages plugins must be explicitly enabled even though they are
# pre-installed in the build image. `_includes/head.html` uses `{% seo %}`
# so jekyll-seo-tag is load-bearing; the others are free additions
# (all on the Pages whitelist, no Gemfile changes needed).
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-github-metadata
  - jekyll-feed
  - jekyll-redirect-from

markdown: kramdown
kramdown:
  syntax_highlighter: rouge
  input: GFM
  hard_wrap: false

permalink: pretty

defaults:
  - scope:
      path: ""
      type: pages
    values:
      layout: default

exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - vendor
  - .jekyll-cache

# Minimal top-nav during the rebuild. Restore docs + download links once the
# new client-facing platform is live.
nav: []
