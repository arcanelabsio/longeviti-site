<aside class="docs__sidebar" aria-label="Docs navigation">
  {% for section in site.docs_nav %}
    <h4>{{ section.section }}</h4>
    <ul>
      {% for item in section.items %}
        {% assign item_url = item.url | relative_url %}
        {% assign current = page.url | relative_url %}
        <li>
          <a href="{{ item_url }}"{% if item_url == current %} class="active" aria-current="page"{% endif %}>{{ item.title }}</a>
        </li>
      {% endfor %}
    </ul>
  {% endfor %}
</aside>
